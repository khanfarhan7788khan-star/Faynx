<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Faynx - High quality wallpapers with premium experience." />
  <meta name="theme-color" content="#00ffd5" />
  <title>Faynx | Premium Wallpapers</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Favicon -->
  <link rel="icon" href="/icons/icon-192.png" />

  <!-- Preconnect -->
  <link rel="preconnect" href="https://api.unsplash.com" />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="ios-header">
  <div class="header-content">
    <h1 class="app-title">Fay<span>nx</span></h1>

    <div class="header-search">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="searchInput"
        placeholder="Search wallpapers…"
        autocomplete="off"
        aria-label="Search wallpapers"
      />
    </div>

    <div class="header-right">
      <button class="mobile-search-toggle" id="mobileSearchToggle" aria-label="Search">🔍</button>
      <div class="profile-wrapper">
        <button class="profile-btn" id="profileToggleBtn" aria-label="Profile menu">
          <img id="profileAvatar" src="https://i.pravatar.cc/150?img=32" alt="Profile" />
        </button>
        <div id="profileMenu" class="profile-menu hidden">
          <button id="loginBtn">🔑 Login / Sign up</button>
          <button id="profileBtn" class="hidden">⚙️ Profile Settings</button>
          <button id="favMenuBtn">💖 Favorites</button>
          <button id="logoutBtn" class="hidden">🚪 Logout</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile search bar (hidden by default) -->
  <div id="mobileSearchBar" class="mobile-search-bar hidden">
    <input
      type="search"
      id="mobileSearchInput"
      placeholder="Search wallpapers…"
      autocomplete="off"
      aria-label="Search wallpapers"
    />
  </div>

  <!-- Categories -->
  <div class="categories-wrap">
    <div id="categoriesBar" class="categories-bar"></div>
  </div>
</header>

<!-- ================= AUTH MODAL ================= -->
<div id="authModal" class="auth-modal hidden" role="dialog" aria-modal="true" aria-label="Login">
  <div class="auth-box">
    <h2>Welcome to Faynx</h2>
    <p class="auth-subtitle">Sign in or create a free account</p>

    <input id="emailInput"    type="email"    placeholder="Email address" required autocomplete="email" />
    <input id="passwordInput" type="password" placeholder="Password"      required autocomplete="current-password" />

    <label class="remember-box">
      <input type="checkbox" id="rememberMe" />
      Remember me
    </label>

    <p id="authError" class="auth-error hidden"></p>

    <button id="authSubmitBtn" class="auth-primary-btn">Continue</button>
    <div class="auth-divider"><span>or</span></div>
    <button id="googleBtn" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
  </div>
</div>

<!-- ================= PROFILE PAGE ================= -->
<section id="profilePage" class="profile-page hidden">
  <div class="profile-card">
    <div class="profile-header">
      <img id="profilePageAvatar" src="https://i.pravatar.cc/150?img=32" alt="Avatar" />
      <div>
        <h2 id="profilePageName">User</h2>
        <p id="profilePageEmail">email@example.com</p>
      </div>
    </div>

    <div id="premiumStatus" class="premium-status free">FREE USER</div>

    <button class="upgrade-btn hidden" id="upgradeBtn">⭐ Upgrade to Premium</button>

    <div class="redeem-section">
      <h3>Redeem Premium Code</h3>
      <div class="redeem-box">
        <input
          type="text"
          id="redeemInput"
          placeholder="Enter code (e.g. FAYNX2024)"
          autocomplete="off"
        />
        <button id="redeemBtn">Apply</button>
      </div>
    </div>

    <button class="back-profile-btn" id="closeProfileBtn">← Back to Gallery</button>
  </div>
</section>

<!-- ================= GALLERY ================= -->
<main id="gallery" class="gallery"></main>

<!-- ================= FAVORITES PAGE ================= -->
<section id="favoritesPage" class="hidden">
  <div class="favorites-header">
    <h2>💖 Favorites</h2>
    <button onclick="closeFavorites()" class="back-profile-btn">← Back</button>
  </div>
  <div id="favoritesGrid" class="gallery"></div>
</section>

<!-- ================= SCRIPTS ================= -->
<script>
  // Profile dropdown toggle
  const profileToggleBtn = document.getElementById("profileToggleBtn");
  const profileMenu = document.getElementById("profileMenu");
  const mobileSearchToggle = document.getElementById("mobileSearchToggle");
  const mobileSearchBar = document.getElementById("mobileSearchBar");
  const mobileSearchInput = document.getElementById("mobileSearchInput");

  profileToggleBtn.onclick = () => profileMenu.classList.toggle("hidden");

  document.addEventListener("click", e => {
    if (!profileToggleBtn.contains(e.target) && !profileMenu.contains(e.target)) {
      profileMenu.classList.add("hidden");
    }
  });

  // Mobile search toggle
  mobileSearchToggle.onclick = () => {
    mobileSearchBar.classList.toggle("hidden");
    if (!mobileSearchBar.classList.contains("hidden")) {
      mobileSearchInput.focus();
    }
  };

  // Wire favorites button in menu
  document.getElementById("favMenuBtn")?.addEventListener("click", () => {
    profileMenu.classList.add("hidden");
    openFavorites?.();
  });
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
