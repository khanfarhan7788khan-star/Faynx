<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>You're Offline — Faynx</title>
  <style>
    :root {
      --ink:#06060a; --ink2:#0d0d14; --ink3:#151520;
      --gold:#c9a96e; --gold2:#e8c98a;
      --rule:rgba(255,255,255,0.07); --mist:#8888a4; --fog:#44445a;
      --gold-glow:rgba(201,169,110,0.18);
    }
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'DM Sans',system-ui,sans-serif;
      background:var(--ink); color:#f0f0f8;
      min-height:100svh; display:flex;
      align-items:center; justify-content:center;
      padding:24px;
    }
    .card {
      width:100%; max-width:380px;
      background:var(--ink2); border:1px solid var(--rule);
      border-radius:24px; padding:44px 32px 40px;
      text-align:center;
      box-shadow:0 40px 100px rgba(0,0,0,.9);
    }
    .wordmark {
      font-family:'Georgia',serif;
      font-size:22px; font-weight:400;
      letter-spacing:.22em; text-transform:uppercase;
      color:var(--gold); margin-bottom:32px; display:block;
    }
    .icon {
      width:64px; height:64px; border-radius:50%;
      background:var(--ink3); border:1px solid var(--rule);
      display:flex; align-items:center; justify-content:center;
      font-size:28px; margin:0 auto 22px;
    }
    h1 {
      font-family:'Georgia',serif; font-size:26px;
      font-weight:400; font-style:italic;
      color:#f0f0f8; margin-bottom:10px;
    }
    p {
      font-size:13px; color:var(--mist); line-height:1.75;
      margin-bottom:28px; font-weight:300;
    }
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:13px 28px; border-radius:999px;
      background:var(--gold); color:var(--ink);
      font-size:13px; font-weight:600;
      font-family:'DM Sans',system-ui,sans-serif;
      letter-spacing:.06em; border:none; cursor:pointer;
      transition:background .15s, transform .15s;
    }
    .btn:hover { background:var(--gold2); transform:translateY(-1px); }
    .divider { height:1px; background:var(--rule); margin:28px 0; }
    .saved-hint {
      font-size:12px; color:var(--fog); line-height:1.6; font-weight:300;
    }
    .saved-hint strong { color:var(--mist); font-weight:400; }
  </style>
</head>
<body>
  <div class="card">
    <span class="wordmark">FAYNX</span>
    <div class="icon">◈</div>
    <h1>You're Offline</h1>
    <p>An internet connection is required to browse and download new wallpapers. Check your connection and try again.</p>
    <button class="btn" onclick="location.reload()">
      ↻ Retry Connection
    </button>
    <div class="divider"></div>
    <p class="saved-hint">
      <strong>Saved wallpapers</strong> you cached while online
      are still available in your Saved section.
    </p>
  </div>
</body>
</html>
