<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>You're Offline — Faynx</title>
  <style>
    :root { --accent:#7c5cbf; --accent2:#a879f5; --bg:#080810; --bg2:#0f0f1a; --border:rgba(255,255,255,0.07); }
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:#eeeef5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .card { width:100%; max-width:360px; background:var(--bg2); border:1px solid var(--border); border-radius:24px; padding:36px 28px; text-align:center; box-shadow:0 32px 80px rgba(0,0,0,.8); }
    .icon { font-size:48px; margin-bottom:16px; }
    .logo { font-size:20px; font-weight:800; font-style:italic; background:linear-gradient(135deg,#a879f5,#7c5cbf); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:20px; display:block; }
    h1 { font-size:22px; font-weight:700; margin-bottom:8px; }
    p { font-size:14px; color:#8080a0; line-height:1.65; margin-bottom:24px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 28px; border-radius:999px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-size:14px; font-weight:700; border:none; cursor:pointer; transition:opacity .15s,transform .15s; }
    .btn:hover { opacity:.88; transform:translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <span class="logo">Faynx</span>
    <div class="icon">📴</div>
    <h1>You're Offline</h1>
    <p>An internet connection is required to browse and download wallpapers. Check your connection and try again.</p>
    <button class="btn" onclick="location.reload()">↻ Retry Connection</button>
  </div>
</body>
</html>
