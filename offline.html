<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Faynx</title>

  <style>
    :root {
      --primary: #00ffd5;
      --primary-dark: #00bfa6;
      --glass: rgba(255,255,255,0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #0f2027, #000);
      color: white;
      text-align: center;
    }

    .offline-box {
      width: 92%;
      max-width: 380px;
      padding: 30px;
      border-radius: 24px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0,0,0,.7);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg,var(--primary),var(--primary-dark));
      color: black;
    }

    button:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="offline-box">
    <h1>📴 You're Offline</h1>
    <p>Internet connection is required to load new wallpapers.</p>
    <button onclick="location.reload()">Retry</button>
  </div>

</body>
</html>
